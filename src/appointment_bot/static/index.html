<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>בוט תורים מוקדמים</title>
<style>
  :root { --bg:#0f1623; --panel:#172033; --me:#2563eb; --bot:#243049; --txt:#e8edf6; --muted:#90a0bd; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",Arial,sans-serif; background:var(--bg); color:var(--txt);
         display:flex; flex-direction:column; height:100vh; }
  header { background:var(--panel); padding:14px 18px; font-size:18px; font-weight:600;
           border-bottom:1px solid #0008; display:flex; align-items:center; gap:10px; }
  header .dot { width:10px; height:10px; border-radius:50%; background:#22c55e; }
  header .mode { margin-inline-start:auto; font-size:12px; color:var(--muted); font-weight:400; }
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:78%; padding:10px 14px; border-radius:14px; white-space:pre-wrap; line-height:1.45;
         font-size:15px; word-break:break-word; }
  .user { align-self:flex-start; background:var(--me); border-bottom-right-radius:4px; }
  .bot  { align-self:flex-end;   background:var(--bot); border-bottom-left-radius:4px; }
  .time { font-size:10px; color:var(--muted); margin-top:4px; }
  .watches { padding:8px 16px; background:#101a2c; border-top:1px solid #0006; font-size:13px; color:var(--muted); }
  .watches b { color:var(--txt); }
  form { display:flex; gap:8px; padding:12px; background:var(--panel); border-top:1px solid #0008; }
  input { flex:1; padding:12px 14px; border-radius:10px; border:1px solid #2b3a55; background:#0e1626;
          color:var(--txt); font-size:15px; }
  button { padding:12px 18px; border:0; border-radius:10px; background:var(--me); color:#fff;
           font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .hint { padding:6px 16px 0; font-size:12px; color:var(--muted); }
</style>
</head>
<body>
  <header>
    <span class="dot"></span> בוט תורים מוקדמים
    <span class="mode" id="mode"></span>
  </header>

  <div id="chat"></div>
  <div class="watches" id="watches">טוען…</div>

  <div class="hint">דוגמאות: "רופא משפחה לעדי ברעננה בבוקר, דחוף" · "רשימה" · "בטל"</div>
  <form id="f">
    <input id="m" autocomplete="off" placeholder="כתבי לבוט מה לחפש…" />
    <button id="send" type="submit">שליחה</button>
  </form>

<script>
const chat = document.getElementById('chat');
const watchesEl = document.getElementById('watches');
const modeEl = document.getElementById('mode');

function fmtTime(iso){ try { return new Date(iso).toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'}); } catch(e){ return ''; } }

function render(state){
  chat.innerHTML = '';
  for (const m of (state.messages||[])){
    const d = document.createElement('div');
    d.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
    d.textContent = m.text;
    const t = document.createElement('div'); t.className='time'; t.textContent = fmtTime(m.at);
    d.appendChild(t);
    chat.appendChild(d);
  }
  chat.scrollTop = chat.scrollHeight;
  const ws = state.watches || [];
  watchesEl.innerHTML = ws.length
    ? '<b>מעקבים פעילים (' + ws.length + '):</b><br>' + ws.map(w=>'• '+w).join('<br>')
    : 'אין מעקבים פעילים כרגע.';
  modeEl.textContent = state.dry_run ? '🔒 מצב בדיקה (לא תופס תורים)' : '🟢 פעיל';
}

async function load(){
  try { const r = await fetch('/api/state'); render(await r.json()); } catch(e){}
}

document.getElementById('f').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const inp = document.getElementById('m');
  const text = inp.value.trim();
  if(!text) return;
  inp.value = '';
  document.getElementById('send').disabled = true;
  try {
    const r = await fetch('/api/chat', {method:'POST', headers:{'Content-Type':'application/json'},
                                        body: JSON.stringify({message:text})});
    render(await r.json());
  } catch(e){ alert('שגיאת רשת'); }
  document.getElementById('send').disabled = false;
  inp.focus();
});

load();
setInterval(load, 15000);   // refresh so bot alerts appear without a reload
</script>
</body>
</html>
